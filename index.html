<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>實習助手｜卡戳</title>
  <meta name="description" content="專業實習生活管理 APP：工時追蹤、記帳系統、週誌工作台、畢業檢查清單。" />
  <meta name="theme-color" content="#1f3c88" />
  <link rel="stylesheet" href="./assets/app.css" />
</head>
<body>
  <div class="app-container">
    
    <aside class="desktop-sidebar">
      <div class="sidebar-header">
        <div class="brand-logo">KTO</div>
        <div class="brand-text">實習助手</div>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-page="dashboard">
          <span class="icon">📊</span>
          <span class="label">首頁</span>
        </button>
        <button class="nav-item" data-page="hours">
          <span class="icon">⏱</span>
          <span class="label">工時</span>
        </button>
        <button class="nav-item" data-page="expenses">
          <span class="icon">💰</span>
          <span class="label">記帳</span>
        </button>
        <button class="nav-item" data-page="notes">
          <span class="icon">📝</span>
          <span class="label">週誌</span>
        </button>
        <button class="nav-item" data-page="checklist">
          <span class="icon">✓</span>
          <span class="label">檢查表</span>
        </button>
        <button class="nav-item" data-page="settings">
          <span class="dynamic-icon icon-settings"></span>
          <span class="label">設定</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" id="sidebar-logout">登出</button>
        <p class="user-info" id="sidebar-user">未登入</p>
      </div>
    </aside>

    <nav class="mobile-tabs">
      <button class="tab-item active" data-page="dashboard">
        <span class="icon">📊</span>
        <span class="label">首頁</span>
      </button>
      <button class="tab-item" data-page="hours">
        <span class="icon">⏱</span>
        <span class="label">工時</span>
      </button>
      <button class="tab-item" data-page="expenses">
        <span class="icon">💰</span>
        <span class="label">記帳</span>
      </button>
      <button class="tab-item" data-page="notes">
        <span class="icon">📝</span>
        <span class="label">週誌</span>
      </button>
      <button class="tab-item" data-page="checklist">
        <span class="icon">✓</span>
        <span class="label">檢查</span>
      </button>
    </nav>

    <main class="app-main">
      
      <div class="page active" id="page-dashboard" data-page="dashboard">
        <div class="page-header">
          <h1>首頁</h1>
          <button class="mobile-settings-btn nav-item" data-page="settings"><span class="dynamic-icon icon-settings"></span></button>
        </div>
        <div class="page-content">
          
          <div class="card" style="margin-bottom: 20px;">
            <div class="progress-label-row">
              <label>當月支出總計</label>
              <strong id="progress-expense-text" class="text-primary" style="font-size: 1.6rem;">￥0 / NT$0</strong>
            </div>
          </div>

          <div class="card">
            <div class="progress-compact">
              <div class="progress-item">
                <div class="progress-label-row">
                  <label>實習進度</label>
                  <strong id="progress-text" class="text-primary">0%</strong>
                </div>
                <div class="progress-bar">
                  <span id="progress-main" style="width:0%"></span>
                </div>
              </div>
              <div class="progress-item">
                <div class="progress-label-row">
                  <label>工時達成</label>
                  <strong id="progress-hours-text" class="text-primary">0/160 小時</strong>
                </div>
                <div class="progress-bar">
                  <span id="progress-hours" style="width:0%"></span>
                </div>
              </div>
              <div class="progress-item">
                <div class="progress-label-row">
                  <label>檢查表完成</label>
                  <strong id="progress-checklist-text" class="text-primary">0/10 項</strong>
                </div>
                <div class="progress-bar">
                  <span id="progress-checklist" style="width:0%"></span>
                </div>
              </div>
            </div>
          </div>

          <section class="section">
            <h2>近期提醒</h2>
            <div id="dash-reminders" class="reminder-list card"></div>
          </section>

          <!-- 新增：歷史簽到紀錄 (置底) -->
           <section class="section" style="margin-top: 30px; margin-bottom: 40px;">
             <h2>歷史簽到紀錄</h2>
             <div class="card" style="padding: 16px; display: flex; justify-content: space-between; align-items: center;">
               <div>
                 <p style="margin: 0; font-size: 1rem;">目前已累計：<strong id="history-checkin-count" class="text-primary" style="font-size: 1.2rem;">0</strong> 天</p>
                 <p style="margin: 4px 0 0 0; font-size: 0.85rem; color: var(--text-muted);">最後簽到：<span id="history-last-checkin">無</span></p>
               </div>
               <button class="btn secondary" id="btn-view-checkin-history" style="margin: 0; padding: 8px 16px;">查看明細</button>
             </div>
           </section>
        </div>
      </div>


      <div class="page" id="page-hours" data-page="hours">
        <div class="page-header">
          <h1>工時管理</h1>
          <button class="mobile-settings-btn nav-item" data-page="settings"><span class="dynamic-icon icon-settings"></span></button>
        </div>
        <div class="page-content">
          <div class="card">
            <h2 id="hours-target-label">目標工時</h2>
            <div class="hours-display">
              <strong id="hours-display">0</strong>
              <span>小時</span>
            </div>
            <p class="hint" id="hours-hint">目標 160 小時</p>
          </div>

          <section class="section">
            <h2 id="punch-date-label">今日打卡紀錄</h2>
            <div class="card">
              
              <div id="punch-realtime-section">
                <div class="punch-buttons" style="margin-bottom: 16px;">
                  <button class="btn" id="punch-in">打卡進</button>
                  <button class="btn secondary" id="punch-out">打卡出</button>
                </div>
              </div>

              <div id="punch-manual-section" style="display: none; margin-bottom: 16px;">
                <div class="input-group">
                  <input type="number" id="manual-hours-input" placeholder="輸入今日總工時 (例如: 8)" step="0.5">
                  <button class="btn" id="manual-hours-submit">儲存今日工時</button>
                </div>
              </div>

              <div id="today-punch-list" style="margin-bottom: 16px; border-top: 1px dashed var(--border); padding-top: 12px;"></div>

              <button class="btn secondary" id="btn-manage-punch" style="width: 100%; border-style: dashed;">📋 管理所有歷史紀錄</button>
            </div>
          </section>
        </div>
      </div>

      <div class="page" id="page-expenses" data-page="expenses">
        <div class="page-header">
          <h1>記帳系統</h1>
          <button class="mobile-settings-btn nav-item" data-page="settings"><span class="dynamic-icon icon-settings"></span></button>
        </div>

        <div class="page-content">
          <div class="card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 16px;">
            <button class="btn-icon" id="btn-prev-month" style="font-size: 1.2rem; padding: 8px 16px; background: var(--primary-light); border-radius: 8px; color: var(--primary);">◀</button>
            <strong id="current-month-display" style="font-size: 1.2rem;">載入中...</strong>
            <button class="btn-icon" id="btn-next-month" style="font-size: 1.2rem; padding: 8px 16px; background: var(--primary-light); border-radius: 8px; color: var(--primary);">▶</button>
          </div>
          
          <div class="card" style="margin-bottom: 24px;">
            <h2 style="margin-top: 0; text-align: center; color: var(--text-muted); font-size: 0.95rem;">本月總支出</h2>
            <div class="expense-display">
              <div class="currency">
                <span class="label">日幣</span>
                <strong id="expense-jpy">￥0</strong>
              </div>
              <div class="divider"></div>
              <div class="currency">
                <span class="label">台幣估算</span>
                <strong id="expense-ntd">NT$0</strong>
              </div>
            </div>
          </div>
          
          <div id="monthly-expense-list" style="padding-bottom: 80px;"></div>
        </div>
        
        <button id="btn-fab-add-expense" class="fab-btn">＋</button>
      </div> 
        
      <div class="page" id="page-notes" data-page="notes">
        <div class="page-header">
          <h1>週誌與備註</h1>
          <button class="mobile-settings-btn nav-item" data-page="settings"><span class="dynamic-icon icon-settings"></span></button>
        </div>
        <div class="page-content">
          <section class="section">
            <h2>快速備註</h2>
            <div class="card">
              <textarea id="quick-note" placeholder="臨時筆記..." rows="3"></textarea>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                <button class="btn" id="save-note">保存</button>
                <button class="btn secondary" id="clear-note">清除</button>
              </div>
              <button class="btn secondary" id="btn-manage-note" style="width: 100%; border-style: dashed;">📂 管理歷史備註</button>
            </div>
          </section>

          <section class="section">
            <h2>週誌編寫</h2>
            <div class="card">
              <p class="week-label" id="week-label">請先在設定頁設定實習開始日期</p>
              <textarea id="weekly-journal" placeholder="寫週誌或報告草稿..." rows="8"></textarea>
              <div style="display: grid; gap: 12px; margin-top: 12px;">
                <button class="btn" id="save-journal">儲存週誌</button>
                <button class="btn secondary" id="btn-open-gallery" style="border-style: dashed;">📸 開啟/管理實習相簿</button>
                <button class="btn secondary" id="btn-manage-journal" style="border-style: dashed;">📖 管理歷史週誌與匯出</button>
              </div>
            </div>
          </section>
        </div>
      </div>

      <div class="page" id="page-checklist" data-page="checklist">
        <div class="page-header">
          <h1>畢業通關清單</h1>
          <button class="mobile-settings-btn nav-item" data-page="settings"><span class="dynamic-icon icon-settings"></span></button>
        </div>
        <div class="page-content">
          <section class="section">
            <h2>學校規定文件清單</h2>
            <div class="card">
              <div id="checklist" class="checklist"></div>
              <p class="hint">勾選後會自動保存進度</p>
            </div>
          </section>
          
          <section class="section">
            <h2>自訂重要提醒</h2>
            <div class="card">
              <div id="reminder-list" class="reminder-list" style="margin-bottom: 16px;"></div>
              <div class="input-group">
                <input type="text" id="new-reminder-title" placeholder="新增提醒事項" />
                <input type="date" id="new-reminder-date" />
                <button class="btn" id="add-reminder">新增</button>
              </div>
            </div>
          </section>
        </div>
      </div>

      <div class="page" id="page-settings" data-page="settings">
        <div class="page-header">
          <h1>設定 (雲端同步區)</h1>
          <button class="mobile-settings-btn nav-item" data-page="settings"><span class="dynamic-icon icon-settings"></span></button>
        </div>
        <div class="page-content">
          
          <section class="section">
            <h2>帳號登入 (必填以啟用雲端備份)</h2>
            <div class="card">
              <div class="setting-row">
                <button class="btn" id="settings-login" style="background:#4285F4;">用 Google 帳號登入</button>
              </div>
              <p id="settings-status" class="hint">目前狀態：檢查中...</p>
            </div>
          </section>

          <section class="section">
            <h2>個人化模式選擇</h2>
            <div class="card">
              <div class="setting-row">
                <label>打卡模式</label>
                <select id="settings-punch-mode" class="styled-select">
                  <option value="realtime">即時打卡 (上班點進、下班點出)</option>
                  <option value="manual">手動時數 (下班後一次輸入總小時)</option>
                </select>
              </div>
              <div class="setting-row">
                <div style="display: flex; align-items: center; gap: 8px;">
                  <label>工時目標類型</label>
                  <button id="btn-hours-help" style="border:none; background:#e6eefc; color:#1f3c88; border-radius:50%; width:20px; height:20px; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; font-weight:bold;">?</button>
                </div>
                <select id="settings-hours-mode" class="styled-select">
                  <option value="monthly">每月目標</option>
                  <option value="total">總時數目標</option>
                </select>
              </div>
              <div class="setting-row">
                <label>目標時數設定</label>
                <input type="number" id="settings-hours-target" value="160" min="1" />
              </div>
            </div>
          </section>

          <section class="section">
            <h2>實習日期</h2>
            <div class="card">
              <div class="setting-row">
                <label>開始日期</label>
                <input type="date" id="settings-start" />
              </div>
              <div class="setting-row">
                <label>預計結束</label>
                <input type="date" id="settings-end" />
              </div>
            </div>
          </section>

          <div class="setting-row">
            <label>個人化主題選擇 (簽到解鎖)</label>
            <select id="settings-theme-select" class="styled-select">
              </select>
          </div>

          <section class="section">
            <h2>資料備份與還原</h2>
            <div class="card" style="display: grid; gap: 12px;">
              <button class="btn" id="export-csv" style="background-color: #107c41; color: white; border-color: #107c41;">📊 下載實習報表 (Excel)</button>
              <button class="btn secondary" id="data-export">匯出完整備份 (JSON)</button>
              <button class="btn secondary" id="data-import">匯入備份 (JSON)</button>
              <input type="file" id="import-file" accept=".json" style="display:none">
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">管理</h2>
        <button id="modal-close" class="btn-icon">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="./assets/app.js"></script>
</body>
</html>
